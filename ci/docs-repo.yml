# Vendored docs CI (replaces inaccessible synthread/docs-viewer include).
# Stable channel: main. Preview channel: next/firmware-package, preview/*, MRs.

stages:
  - build
  - deploy

variables:
  HOME: "/tmp"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.docs_rules_stable:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        DOCS_CHANNEL: stable
    - if: $CI_COMMIT_TAG
      variables:
        DOCS_CHANNEL: stable

.docs_rules_preview:
  rules:
    - if: $CI_COMMIT_BRANCH == "next/firmware-package"
      variables:
        DOCS_CHANNEL: preview
    - if: $CI_COMMIT_BRANCH =~ /^preview\//
      variables:
        DOCS_CHANNEL: preview
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        DOCS_CHANNEL: preview

build:docs:
  stage: build
  image: python:3.14-slim@sha256:44dd04494ee8f3b538294360e7c4b3acb87c8268e4d0a4828a6500b1eff50061
  before_script:
    - export PATH="$HOME/.local/bin:$PATH"
    - pip install --quiet "mkdocs>=1.6,<2" "mkdocs-material>=9.5,<10" pymdown-extensions
  script:
    - mkdocs build
  artifacts:
    paths:
      - site/
    expire_in: 1 week
  rules:
    - !reference [.docs_rules_stable, rules]
    - !reference [.docs_rules_preview, rules]

pages:
  stage: deploy
  needs:
    - job: build:docs
      artifacts: true
  script:
    - mv site public
  artifacts:
    paths:
      - public
  rules:
    - !reference [.docs_rules_stable, rules]

build:n32probe:
  stage: build
  image: golang:1.26-bookworm@sha256:5d2b868674b57c9e48cdd39e891acce4196b6926ca6d11e9c270a8f85106203d
  before_script:
    - apt-get update -qq && apt-get install -y -qq rsync
    - ./scripts/bootstrap-go-flash.sh
  script:
    - export SKIP_GO_FLASH_BOOTSTRAP=1
    - support/usb-validation/n32/build.sh
  artifacts:
    name: "n32probe-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - build/n32probe_usb/
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == "next/firmware-package"
    - if: $CI_COMMIT_BRANCH =~ /^preview\//
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - support/usb-validation/**/*
        - scripts/bootstrap-go-flash.sh
        - deps/**/*
