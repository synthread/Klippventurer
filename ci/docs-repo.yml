# Vendored docs CI (replaces inaccessible synthread/docs-viewer include).
# Stable channel: main. Preview channel: next/firmware-package, preview/*, MRs.

stages:
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

.docs_rules_stable:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      variables:
        DOCS_CHANNEL: stable
    - if: $CI_COMMIT_TAG
      variables:
        DOCS_CHANNEL: stable

.docs_rules_preview:
  rules:
    - if: $CI_COMMIT_BRANCH == "next/firmware-package"
      variables:
        DOCS_CHANNEL: preview
    - if: $CI_COMMIT_BRANCH =~ /^preview\//
      variables:
        DOCS_CHANNEL: preview
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        DOCS_CHANNEL: preview

build:docs:
  stage: build
  image: python:3.14-slim@sha256:a7185a8e40af01bf891414a4df16ef10fc6000cee460a404a13da9029fe41604
  before_script:
    - pip install --quiet "mkdocs>=1.6,<2" "mkdocs-material>=9.5,<10" pymdown-extensions
  script:
    - mkdocs build
  artifacts:
    paths:
      - site/
    expire_in: 1 week
  rules:
    - !reference [.docs_rules_stable, rules]
    - !reference [.docs_rules_preview, rules]

pages:
  stage: deploy
  needs:
    - job: build:docs
      artifacts: true
  script:
    - mv site public
  artifacts:
    paths:
      - public
  rules:
    - !reference [.docs_rules_stable, rules]

build:n32probe:
  stage: build
  image: golang:1.26-bookworm@sha256:5742fba27b66a3532bdbee81351ddd1d1033c0d5d90e04f576f72165d734939d
  before_script:
    - apt-get update -qq && apt-get install -y -qq rsync
    - ./scripts/bootstrap-go-flash.sh
  script:
    - export SKIP_GO_FLASH_BOOTSTRAP=1
    - support/usb-validation/n32/build.sh
  artifacts:
    name: "n32probe-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - build/n32probe_usb/
    expire_in: 2 weeks
  rules:
    - if: $CI_COMMIT_BRANCH == "next/firmware-package"
    - if: $CI_COMMIT_BRANCH =~ /^preview\//
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - support/usb-validation/**/*
        - scripts/bootstrap-go-flash.sh
        - deps/**/*
